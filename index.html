async function sbInsert(table, row) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "return=representation",
      },
      body: JSON.stringify(row),
    });
    if (!res.ok) { const err = await res.text(); console.warn(`Supabase insert error [${table}]:`, err); return null; }
    return await res.json();
  } catch(e) { console.warn("Supabase unreachable:", e.message); return null; }
}

async function sbUpsert(table, row, onConflict="email") {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "resolution=merge-duplicates,return=representation",
      },
      body: JSON.stringify(row),
    });
    if (!res.ok) { const err = await res.text(); console.warn(`Supabase upsert error [${table}]:`, err); return null; }
    return await res.json();
  } catch(e) { console.warn("Supabase unreachable:", e.message); return null; }
}

function normalize(text) {
  return (text||"").toLowerCase().replace(/\s+/g, " ").trim();
}
function normalizeCodeStructure(code) {
  return (code||"")
    .toLowerCase()
    .replace(/(["']).*?\1/g, "STR")
    .replace(/\b\d+(\.\d+)?\b/g, "NUM")
    .replace(/\b[a-z_]\w*\b/g, (word) => {
      const keep = new Set(["print","if","elif","else","for","while","in","range","def","return","class","self","true","false","none","and","or","not","len","type","int","float","str","list","dict","set","tuple","append","pop","sort","reverse","split","upper","lower","replace","get","keys","values","super","pass"]);
      return keep.has(word) ? word : "VAR";
    })
    .replace(/\s+/g, "");
}
function isSimilar(q1, q2) {
  const t1 = normalize(q1.questionText);
  const t2 = normalize(q2.questionText);
  const c1 = normalizeCodeStructure(q1.code);
  const c2 = normalizeCodeStructure(q2.code);
  const sameSkill = !q1.skill || !q2.skill || q1.skill === q2.skill;
  return (
    t1 === t2 ||
    (sameSkill && c1 && c2 && c1 === c2) ||
    (q1.code && q2.code && q1.code.trim() === q2.code.trim())
  );
}

const TEST_QUESTIONS_PER_SKILL = 5;

function buildBalancedTestQuestions(baseQuestions, perSkill=TEST_QUESTIONS_PER_SKILL) {
  const balanced = [];
  SKILLS.forEach(skill => {
    const picked = [];
    const addUnique = (q, fallbackDifficulty=null) => {
      if (!q || picked.length >= perSkill) return;
      const candidate = {
        ...q,
        skill: q.skill || skill.id,
        difficulty: q.difficulty || fallbackDifficulty || "medium",
        type: q.type || "mcq",
      };
      if (!picked.some(existing => isSimilar(candidate, existing))) picked.push(candidate);
    };

    baseQuestions.filter(q => q.skill === skill.id).forEach(addUnique);
    ["easy","medium","hard"].forEach(difficulty => {
      (QUESTION_BANK[skill.id]?.[difficulty] || []).forEach(q => addUnique(q, difficulty));
    });
    balanced.push(...picked.slice(0, perSkill));
  });
  return balanced;
}

function getFallbackQuestion(skillId, difficulty, askedQuestions=[]) {
  const skillBank = QUESTION_BANK[skillId] || {};
  const allQuestions = [...(skillBank.easy||[]), ...(skillBank.medium||[]), ...(skillBank.hard||[])];
  const sameDifficulty = (skillBank[difficulty] || []);
  const pools = [sameDifficulty, allQuestions];
  for (const pool of pools) {
    const available = pool.filter(q => !askedQuestions.some(aq => isSimilar(q, aq)));
    if (available.length) {
      const q = available[Math.floor(Math.random() * available.length)];
      return {...q, type:"mcq", skill:skillId, difficulty:q.difficulty || difficulty};
    }
  }
  return null;
}

const BALANCED_PRE_TEST_QUESTIONS = buildBalancedTestQuestions(PRE_TEST_QUESTIONS);
const BALANCED_POST_TEST_QUESTIONS = buildBalancedTestQuestions(POST_TEST_QUESTIONS);

async function callGroq(messages, system, maxTokens=300) {
  const res = await fetch("https://soft-surf-4802.itiwizeinab.workers.dev",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:GROQ_MODEL, max_tokens:maxTokens, temperature:0.3,
      messages:[{role:"system",content:system},...messages] }),
  });
  if(!res.ok) throw new Error(await res.text());
  return (await res.json()).choices[0].message.content;
}

async function getStaticFeedback(question, selectedIdx) {
  const system = `You are a Python tutor giving brief, factual feedback. State the correct answer and why in 1-2 plain sentences. No markdown.`;
  try {
    return await callGroq([{role:"user",content:`Question: ${question.questionText}\nStudent chose: "${question.options[selectedIdx]}"\nCorrect answer: "${question.options[question.correctIndex]}"\nExplanation: ${question.explanation}`}], system, 150);
  } catch(e) {
    return `The correct answer is "${question.options[question.correctIndex]}". ${question.explanation}`;
  }
}

function saveSession(email, data) {
  try { localStorage.setItem(`trad_session_${email}`, JSON.stringify({...data, savedAt:new Date().toISOString()})); } catch(e) {}
}
function loadSession(email) {
  try { const d = localStorage.getItem(`trad_session_${email}`); return d?JSON.parse(d):null; } catch(e) { return null; }
}
function clearSession(email) {
  try { localStorage.removeItem(`trad_session_${email}`); } catch(e) {}
}

      group_type:"traditional",

      improvement_pct:improvement, hake_gain:hakeGain,
      total_questions:trainAnswers.length,
      correct_answers:trainAnswers.filter(a=>a.correct).length,
      session_duration_ms:sessionEndTime?sessionEndTime-sessionStartTime:0,
      completed_at:new Date().toISOString(),
    });
  }

  async function handleTrainAnswer(idx) {
    if(trainShowFeedback) return;
    setTrainSelected(idx);
    setTrainShowFeedback(true);
    const q = currentQuestion;
    const correct = Number(idx)===Number(q.correctIndex);
    const rt = questionStartTime ? Date.now()-questionStartTime : 0;
    const entry = {...q, selected:idx, correct, responseTimeMs:rt, skillId:currentSkillId};
    setTrainAnswers(p=>[...p,entry]);
    const logEntry = correct ? `✅ ${currentSkillId}` : `❌ ${currentSkillId}`;
    setSessionLog(l=>[logEntry,...l]);
    setResponseTimes(p=>[...p,{skill:currentSkillId,difficulty:q.difficulty,timeMs:rt,correct,errorType:q.errorType,phase:"training"}]);
    sbInsert("training_answers",{
      participant_email:participantEmail, skill:currentSkillId,
      difficulty:q.difficulty, error_type:q.errorType,
      selected_index:idx, correct_index:q.correctIndex,
      is_correct:correct, response_time_ms:rt,
      answered_at:new Date().toISOString(),
      group_type:"traditional",
      is_spaced_repeat:false, is_ai_generated:false,
      is_remediation:false, difficulty_source:"fixed",
    });
    if(!correct) {
      setTrainAiLoading(true);
      try { const fb = await getStaticFeedback(q, idx); setTrainAiFeedback(fb); }
      catch(e) { setTrainAiFeedback(`The correct answer is "${q.options[q.correctIndex]}". ${q.explanation}`); }
      setTrainAiLoading(false);
    }
  }

      setPhaseTimestamps(p=>({...p,training_end:now,posttest_start:now}));
      setTestIdx(0); setTestAnswers([]); setTestSelected(null);
      setTestShowFeedback(false); setAiFeedback(null);
      setScreen("posttest"); setQuestionStartTime(Date.now());
    } else if(isLastQuestion) {
      setCurrentSkillIndex(i=>i+1);
      setCurrentQuestionIndex(0);
    } else {
      setCurrentQuestionIndex(i=>i+1);
    }
    setTrainSelected(null); setTrainShowFeedback(false);

          <div className="sidebar-left" style={{width:210,background:C.bgSidebar,borderRight:`1px solid ${C.border}`,padding:14,overflowY:"auto",flexShrink:0,display:"flex",flexDirection:"column",gap:16}}>
            <div>
              <div style={{color:C.textM,fontSize:10,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Learning Path</div>
              {SKILLS.map((s,idx)=>{
                const done=idx<currentSkillIndex, active=idx===currentSkillIndex;
                const skillAnswers = trainAnswers.filter(a=>a.skillId===s.id);
                const pct = skillAnswers.length>0?Math.round(skillAnswers.filter(a=>a.correct).length/skillAnswers.length*100):0;
                return (
                  <div key={s.id} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                      <span style={{fontSize:10,fontFamily:font,color:done?C.success:active?C.accentL:C.textM,fontWeight:active?"bold":"normal"}}>{done?"✅":active?"▶":"○"} {s.icon} {s.id}</span>
                      {done&&<span style={{fontSize:9,fontFamily:font,color:C.success}}>{pct}%</span>}
                    </div>
                    {active&&<ProgressBar value={skillProgress} color={C.accent} height={3}/>}
                    {done&&<ProgressBar value={100} color={C.success} height={3}/>}
                  </div>
                );
              })}
            </div>
            <div>
              <div style={{color:C.textM,fontSize:10,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📋 Fixed Sequence</div>
              <div style={{fontSize:10,fontFamily:font,color:C.textD,lineHeight:1.6}}>
                All participants receive the same questions in the same order.
              </div>
            </div>
            <div>
              <div style={{color:C.textM,fontSize:10,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>🧾 Log</div>
              <div style={{maxHeight:180,overflowY:"auto"}}>
                {sessionLog.map((e,i)=><div key={i} style={{fontSize:10,fontFamily:font,color:C.textD,padding:"3px 0",borderBottom:`1px solid ${C.border}22`,lineHeight:1.5}}>{e}</div>)}
                {sessionLog.length===0&&<div style={{fontSize:10,color:C.textM,fontFamily:font}}>No activity yet...</div>}
              </div>
            </div>
          </div>

          {/* Main */}
          <div style={{flex:1,padding:24,overflowY:"auto"}}>
            <div style={{maxWidth:660,margin:"0 auto"}}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{background:`${C.accent}22`,color:C.accentL,padding:"3px 10px",borderRadius:6,fontSize:10,fontFamily:font}}>📋 Traditional</span>
                  <span style={{background:C.bgCard,color:C.textD,padding:"3px 10px",borderRadius:6,fontSize:10,fontFamily:font}}>{skill?.icon} {skill?.label}</span>
                  <span style={{background:q.difficulty==="easy"?`${C.success}22`:q.difficulty==="medium"?`${C.warning}22`:`${C.error}22`,color:q.difficulty==="easy"?C.success:q.difficulty==="medium"?C.warning:C.error,padding:"3px 8px",borderRadius:6,fontSize:9,fontFamily:font}}>{q.difficulty==="easy"?"🟢 Easy":q.difficulty==="medium"?"🟡 Medium":"🔴 Hard"}</span>
                </div>
                <span style={{fontSize:11,color:C.textD,fontFamily:font}}>{trainAnswers.filter(a=>a.correct).length}/{trainAnswers.length} correct</span>
              </div>

              {/* Progress */}
              <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:11,fontFamily:font,color:C.text}}>Overall Progress</span>
                  <span style={{fontSize:11,fontFamily:font,color:C.accentL,fontWeight:700}}>Question {answeredTrainingQuestions+1} / {totalTrainingQuestions}</span>
                </div>
                <ProgressBar value={globalProgress} color={C.accent} height={8}/>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                  <span style={{fontSize:10,color:C.textM,fontFamily:font}}>{skill?.icon} Skill {currentSkillIndex+1}/{SKILLS.length}: Q{currentQuestionIndex+1}/{currentSkillQuestions.length}</span>
                  <span style={{fontSize:10,color:C.textM,fontFamily:font}}>{globalProgress}%</span>
                </div>
              </div>

              {/* Question */}
              <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,padding:24,marginBottom:16,animation:"fadeIn 0.3s"}}>
                <pre style={{color:C.text,fontSize:13,fontFamily:sans,whiteSpace:"pre-wrap",lineHeight:1.7,margin:0}}>{q.questionText}</pre>
                <CodeBlock code={q.code}/>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:16}}>
                  {q.options.map((opt,i)=>{
                    let bg=C.bgHover, border=`1px solid ${C.border}`, color=C.text;
                    if(trainShowFeedback){
                      if(i===Number(q.correctIndex)){bg=`${C.success}22`;border=`1px solid ${C.success}`;color=C.success;}
                      else if(i===Number(trainSelected)&&!correct){bg=`${C.error}22`;border=`1px solid ${C.error}`;color=C.error;}
                    } else if(i===trainSelected){bg=`${C.accent}22`;border=`1px solid ${C.accent}`;color=C.accentL;}
                    return <button key={i} onClick={()=>handleTrainAnswer(i)} disabled={trainShowFeedback}
                      style={{background:bg,border,borderRadius:10,padding:"12px 16px",textAlign:"left",color,fontSize:13,fontFamily:sans,cursor:trainShowFeedback?"default":"pointer",transition:"all 0.2s"}}>
                      <span style={{fontFamily:font,marginRight:8,opacity:0.5}}>{String.fromCharCode(65+i)}.</span>{opt}
                    </button>;
                  })}
                </div>

                {/* Feedback */}
                {trainShowFeedback&&(
                  <div style={{marginTop:16}}>
                    <div style={{background:correct?`${C.success}11`:`${C.error}11`,border:`1px solid ${correct?C.success:C.error}33`,borderRadius:10,padding:14,marginBottom:8}}>
                      <div style={{fontSize:12,fontWeight:700,color:correct?C.success:C.error,marginBottom:6}}>{correct?"✅ Correct!":"❌ Incorrect"}</div>
                      <p style={{fontSize:12,color:C.textD,margin:0,lineHeight:1.7}}>{q.explanation}</p>
                    </div>
                    {!correct&&(
                      <div style={{background:`${C.accent}11`,border:`1px solid ${C.accent}33`,borderRadius:10,padding:14}}>
                        <div style={{fontSize:10,color:C.accentL,fontFamily:font,fontWeight:700,marginBottom:6}}>📝 Standard Feedback</div>
                        {trainAiLoading?<p style={{fontSize:12,color:C.textM,margin:0}}>Getting feedback...</p>:
                          <p style={{fontSize:12,color:C.textD,margin:0,lineHeight:1.7}}>{trainAiFeedback||`Review the explanation above and the correct answer: "${q.options[q.correctIndex]}".`}</p>}
                      </div>
                    )}
                  </div>
                )}
              </div>

              {trainShowFeedback&&(
                <button onClick={nextTrainQuestion}
                  style={{width:"100%",background:`linear-gradient(135deg,${C.accent},${C.accentD})`,color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:14,fontFamily:font,fontWeight:700,cursor:"pointer"}}>
                  {isLastQ?"Start Post-Test →":"Next Question →"}
                </button>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ─── RESULTS ─────────────────────────────────────────────────────────────────
  if(screen==="results") {
    const preAnswers = preTestAnswers;
    const postAnswers = postTestAnswers;
    const preScore = preAnswers.length>0?preAnswers.filter(a=>a.correct).length/preAnswers.length:0;
    const postScore = postAnswers.length>0?postAnswers.filter(a=>a.correct).length/postAnswers.length:0;
    const improvement = Math.round((postScore-preScore)*100);
    const hakeGain = preScore<1?Math.round(((postScore-preScore)/(1-preScore))*100):100;
    const trainCorrect = trainAnswers.filter(a=>a.correct).length;
    const cohenD = (postScore-preScore)/(Math.sqrt(((preScore*(1-preScore))+(postScore*(1-postScore)))/2)||0.01);

    return (
      <div style={{minHeight:"100vh",background:C.bg,fontFamily:sans,padding:24}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:56,marginBottom:12}}>🎓</div>
            <h2 style={{color:C.text,fontFamily:font,fontSize:24,margin:"0 0 8px"}}>Session Complete!</h2>
            <p style={{color:C.textD,fontSize:13}}>Traditional Group — {participantName}</p>
          </div>

          {/* Improvement banner */}
          <div style={{background:improvement>0?`${C.success}11`:`${C.warning}11`,border:`1px solid ${improvement>0?C.success:C.warning}33`,borderRadius:12,padding:20,textAlign:"center",marginBottom:20}}>
            <div style={{color:improvement>0?C.success:C.warning,fontSize:36,fontWeight:800,fontFamily:font}}>{improvement>0?`+${improvement}%`:`${improvement}%`}</div>
            <div style={{color:C.textD,fontSize:13}}>{improvement>10?"Outstanding improvement!":improvement>0?"You've made progress!":"Keep practicing!"}</div>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
            {[
              {l:"Pre-Test",v:`${Math.round(preScore*100)}%`,c:C.textD},
              {l:"Post-Test",v:`${Math.round(postScore*100)}%`,c:C.success},
              {l:"Hake's Gain",v:`${hakeGain}%`,c:C.accent},
              {l:"Cohen's d",v:Math.abs(cohenD).toFixed(2),c:C.warning},
            ].map((m,i)=>(
              <div key={i} style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:10,padding:14,textAlign:"center"}}>
                <div style={{color:m.c,fontSize:20,fontWeight:700,fontFamily:font}}>{m.v}</div>
                <div style={{color:C.textM,fontSize:10,fontFamily:font,marginTop:4}}>{m.l}</div>
              </div>
            ))}
          </div>

          {/* Training summary */}
          <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,padding:24,marginBottom:20}}>
            <h3 style={{color:C.text,fontFamily:font,fontSize:14,margin:"0 0 14px"}}>Training Performance</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
              <div style={{textAlign:"center",background:C.bg,borderRadius:10,padding:12}}>
                <div style={{color:C.accent,fontSize:20,fontWeight:700,fontFamily:font}}>{trainAnswers.length}</div>
                <div style={{color:C.textM,fontSize:10,fontFamily:font}}>Questions Answered</div>
              </div>
              <div style={{textAlign:"center",background:C.bg,borderRadius:10,padding:12}}>
                <div style={{color:C.success,fontSize:20,fontWeight:700,fontFamily:font}}>{trainCorrect}</div>
                <div style={{color:C.textM,fontSize:10,fontFamily:font}}>Correct</div>
              </div>
              <div style={{textAlign:"center",background:C.bg,borderRadius:10,padding:12}}>
                <div style={{color:C.accentL,fontSize:20,fontWeight:700,fontFamily:font}}>{trainAnswers.length>0?Math.round(trainCorrect/trainAnswers.length*100):0}%</div>
                <div style={{color:C.textM,fontSize:10,fontFamily:font}}>Accuracy</div>
              </div>
            </div>
          </div>

          {/* Skill breakdown */}
          <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,padding:24,marginBottom:20}}>
            <h3 style={{color:C.text,fontFamily:font,fontSize:14,margin:"0 0 14px"}}>Skill Performance: Pre → Post</h3>
            {SKILLS.map(s=>{
              const pre = preAnswers.filter(a=>a.skill===s.id);
              const post = postAnswers.filter(a=>a.skill===s.id);
              const preP = pre.length>0?Math.round(pre.filter(a=>a.correct).length/pre.length*100):0;
              const postP = post.length>0?Math.round(post.filter(a=>a.correct).length/post.length*100):0;
              const diff = postP - preP;
              return (
                <div key={s.id} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:12,fontFamily:font,color:C.text}}>{s.icon} {s.label}</span>
                    <span style={{fontSize:12,fontFamily:font,color:diff>0?C.success:diff<0?C.error:C.textM}}>{preP}% → {postP}% ({diff>0?"+":""}{diff}%)</span>
                  </div>
                  <div style={{background:C.border,borderRadius:4,height:8,overflow:"hidden",position:"relative"}}>
                    <div style={{width:`${preP}%`,height:"100%",background:`${C.textM}66`,borderRadius:4,position:"absolute",top:0,left:0}}/>
                    <div style={{width:`${postP}%`,height:"100%",background:postP>=80?C.success:C.accent,borderRadius:4,position:"relative",zIndex:1,transition:"width 1s ease"}}/>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Response time */}
          {responseTimes.length>0&&(
            <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,padding:24,marginBottom:20}}>
              <h3 style={{color:C.text,fontFamily:font,fontSize:14,margin:"0 0 14px"}}>⏱️ Response Time Analysis</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                <div style={{textAlign:"center",background:C.bg,borderRadius:10,padding:12}}>
                  <div style={{color:C.accentL,fontSize:20,fontWeight:700,fontFamily:font}}>{(responseTimes.reduce((a,r)=>a+r.timeMs,0)/responseTimes.length/1000).toFixed(1)}s</div>
                  <div style={{color:C.textM,fontSize:9,fontFamily:font}}>Avg Response</div>
                </div>
                <div style={{textAlign:"center",background:C.bg,borderRadius:10,padding:12}}>
                  <div style={{color:C.success,fontSize:20,fontWeight:700,fontFamily:font}}>{responseTimes.filter(r=>r.correct).length>0?(responseTimes.filter(r=>r.correct).reduce((a,r)=>a+r.timeMs,0)/responseTimes.filter(r=>r.correct).length/1000).toFixed(1):"—"}s</div>
                  <div style={{color:C.textM,fontSize:9,fontFamily:font}}>When Correct</div>
                </div>
                <div style={{textAlign:"center",background:C.bg,borderRadius:10,padding:12}}>
                  <div style={{color:C.error,fontSize:20,fontWeight:700,fontFamily:font}}>{responseTimes.filter(r=>!r.correct).length>0?(responseTimes.filter(r=>!r.correct).reduce((a,r)=>a+r.timeMs,0)/responseTimes.filter(r=>!r.correct).length/1000).toFixed(1):"—"}s</div>
                  <div style={{color:C.textM,fontSize:9,fontFamily:font}}>When Wrong</div>
                </div>
              </div>
            </div>
          )}

          {/* Timing */}
          {sessionStartTime&&sessionEndTime&&(
            <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}33`,borderRadius:12,padding:16,marginBottom:20,textAlign:"center"}}>
              <div style={{color:C.accentL,fontSize:10,fontFamily:font,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>⏱️ Session Timing</div>
              <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
                <div>
                  <div style={{color:C.text,fontSize:18,fontWeight:700,fontFamily:font}}>{Math.floor((sessionEndTime-sessionStartTime)/60000)}m {Math.round(((sessionEndTime-sessionStartTime)%60000)/1000)}s</div>
                  <div style={{color:C.textM,fontSize:9,fontFamily:font}}>Total Duration</div>
                </div>
                {phaseTimestamps.pretest_start&&phaseTimestamps.pretest_end&&(
                  <div>
                    <div style={{color:C.textD,fontSize:14,fontWeight:700,fontFamily:font}}>{Math.floor((phaseTimestamps.pretest_end-phaseTimestamps.pretest_start)/60000)}m {Math.round(((phaseTimestamps.pretest_end-phaseTimestamps.pretest_start)%60000)/1000)}s</div>
                    <div style={{color:C.textM,fontSize:9,fontFamily:font}}>Pre-Test</div>
                  </div>
                )}
                {phaseTimestamps.training_start&&phaseTimestamps.training_end&&(
                  <div>
                    <div style={{color:C.textD,fontSize:14,fontWeight:700,fontFamily:font}}>{Math.floor((phaseTimestamps.training_end-phaseTimestamps.training_start)/60000)}m {Math.round(((phaseTimestamps.training_end-phaseTimestamps.training_start)%60000)/1000)}s</div>
                    <div style={{color:C.textM,fontSize:9,fontFamily:font}}>Training</div>
                  </div>
                )}
                {phaseTimestamps.posttest_start&&phaseTimestamps.posttest_end&&(
                  <div>
                    <div style={{color:C.textD,fontSize:14,fontWeight:700,fontFamily:font}}>{Math.floor((phaseTimestamps.posttest_end-phaseTimestamps.posttest_start)/60000)}m {Math.round(((phaseTimestamps.posttest_end-phaseTimestamps.posttest_start)%60000)/1000)}s</div>
                    <div style={{color:C.textM,fontSize:9,fontFamily:font}}>Post-Test</div>
                  </div>
                )}
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:8}}>
            <button onClick={()=>{
              clearSession(participantEmail);
              setScreen("register");
              setRegEmail("");setRegName("");setRegId("");setRegGender("");setRegMajor("");setRegYear("");setRegPrior("");setRegHours("");
              setParticipantName("");setParticipantEmail("");setParticipantId("");
              setConsentGiven(false);setConsentTimestamp(null);
              setTestIdx(0);setTestAnswers([]);setTestSelected(null);setTestShowFeedback(false);
              setTrainAnswers([]);setCurrentSkillIndex(0);setCurrentQuestionIndex(0);
              setPreTestAnswers([]);setPostTestAnswers([]);setPreBkt(null);setPostBkt(null);
              setSessionStartTime(null);setSessionEndTime(null);setPhaseTimestamps({});setResponseTimes([]);
              setSessionLog([]);setResumeData(null);setRegisterError("");
            }}
              style={{background:C.bgCard,color:C.textD,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 32px",fontSize:13,fontFamily:font,cursor:"pointer"}}>
              🔄 مشارك جديد
            </button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
